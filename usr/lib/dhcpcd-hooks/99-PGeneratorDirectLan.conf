#!/bin/sh
#
# DirectLan direct-connect fallback network.
#
# Design: when eth0 has NO real upstream DHCP lease and falls back to a
# link-local 169.254.x address (i.e. a meter/laptop is plugged directly into
# the Pi with no router/switch on the segment), bring up an isolated ipvlan on
# eth0 and run dhcpd so the directly-connected device gets a 10.10.13.x address.
# When eth0 obtains a real DHCP lease (it is on a real LAN), DirectLan MUST be
# torn down — otherwise its ipvlan l2 shares eth0 L2 broadcast domain and its
# dhcpd answers DHCP broadcasts from every WiFi/LAN client ( handing out
# 10.10.13.x onto the real network ).
#
# Variables
#
DEVICE_NAME="DirectLan"
DEFAULT_FILE="/etc/default/rcPGenerator"
DHCP_CONF_FILE="/etc/dhcp/dhcpd.conf"
PID_FILE="/var/run/dhcpd-DirectLan.pid"
LEASE_FILE="/var/lib/dhcp/dhcpd-DirectLan.leases"
PROGRAM_DAEMON="/sbin/dhcpd -cf $DHCP_CONF_FILE -pf $PID_FILE -lf $LEASE_FILE $DEVICE_NAME"
DIRECT_NET="10.10.13"
. $DEFAULT_FILE

# eth0 is in direct-connect mode ONLY when it has no routable IPv4 address
# ( every address is link-local 169.254.x ). If eth0 carries a real LAN
# address, DirectLan must not exist.
eth0_is_linklocal_only() {
 ip -4 addr show eth0 2>/dev/null | awk '{print $2}' | grep -q '^[0-9]' || return 1
 ip -4 addr show eth0 2>/dev/null | awk '{print $2}' | grep -qv '^169\.254\.' && return 1
 return 0
}

directlan_teardown() {
 if ip link show "$DEVICE_NAME" >/dev/null 2>&1; then
  pkill -9 -f "$PID_FILE" 2>/dev/null
  ip link del "$DEVICE_NAME" 2>/dev/null
 fi
}

#
# UP — carrier up and eth0 fell back to link-local (direct-connect segment).
# Guard: never bring DirectLan up while eth0 still has a real LAN address;
# never double-create.
#
if [ "$ifcarrier" = "up" ] && [ "$reason" = "IPV4LL" ];then
 if ip link show "$DEVICE_NAME" >/dev/null 2>&1; then
  : # already up
 elif eth0_is_linklocal_only; then
  ip link add "$DEVICE_NAME" link eth0 type ipvlan mode l2 bridge
  ifconfig "$DEVICE_NAME" "$DIRECT_NET".1 netmask 255.255.255.0 up
  touch "$LEASE_FILE"
  $PROGRAM_DAEMON
  ip route del default dev eth0 2>/dev/null
 fi
fi

#
# DOWN — carrier lost (cable unplugged)
#
if [ "$ifcarrier" = "down" ] && [ "$reason" = "NOCARRIER" ];then
 directlan_teardown
fi

#
# DOWN — eth0 got/renewed a real DHCP lease, or any lease event while eth0
# carries a real address (direct -> LAN transition). Tear DirectLan down so
# its dhcpd cannot leak 10.10.13.x onto the live LAN/WiFi broadcast domain.
#
if [ "$interface" = "eth0" ];then
 case "$reason" in
  BOUND|RENEW|REBIND|REBOOT|INFORM|EXPIRE|STOP)
   eth0_is_linklocal_only || directlan_teardown
   ;;
 esac
fi
