# /etc/ntp.conf -- PGenerator+
#
# Keeps the system clock disciplined so ArgyllCMS does not age out the
# spectrophotometer wavelength calibration. ntpd slews small offsets (gentle
# on the cal) and, with -g, steps once on a large initial offset at startup.

driftfile /var/lib/ntp/ntp.drift

# Public NTP pool. Requires outbound UDP/123 (and DNS to resolve the pool).
pool 0.debian.pool.ntp.org iburst
pool 1.debian.pool.ntp.org iburst
pool 2.debian.pool.ntp.org iburst
pool 3.debian.pool.ntp.org iburst
pool pool.ntp.org iburst

# This device is an NTP client only -- do not serve time to the network.
restrict -4 default kod notrap nomodify nopeer noquery limited
restrict -6 default kod notrap nomodify nopeer noquery limited
restrict 127.0.0.1
restrict ::1
